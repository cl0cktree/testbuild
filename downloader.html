<!DOCTYPE html>
<html lang="ko">
    <base href="" id="base_url">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <input type="text" id="targetUrl" value="">
        <button id="base_btn">적용</button>
        <input type="number" id="startNum" value="">
        <input type="number" id="endNum" value="">
        <select id="ext">
            <option value="jpg">jpg</option>
            <option value="jpeg">jpeg</option>
            <option value="png">png</option>
            <option value="gif">gif</option>
            <option value="webp">webp</option>
            <option value="mp4">mp4</option>
            <option value="webm">webm</option>
            <option value="avi">avi</option>
            <option value="mov">mov</option>
            <option value="flv">flv</option>
            <option value="wmv">wmv</option>
            <option value="swf">swf</option>
            <option value="doc">doc</option>
            <option value="docx">docx</option>
            <option value="xls">xls</option>
        </select>
        <button id="download_btn">다운로드</button>
    </body>
    <script>
        //-----------------4자리 url_7-------------------
        /**
         * 4자리 넘버링 순차적 이미지 자동 다운로드 스크립트
         * @param {string} baseUrl - 이미지가 저장된 기본 폴더 URL
         * @param {number} startNum - 시작 파일 번호 (예: 1)
         * @param {number} endNum - 끝 파일 번호 (예: 50)
         * @param {string} ext - 확장자
         */
        const download_btn = document.getElementById('download_btn');
        const base_url = document.getElementById('base_url');
        const base_btn = document.getElementById('base_btn');

        base_btn.addEventListener('click',function(){base_url.attributes.href.value = document.getElementById('targetUrl').value;}, false);

        function download_all(){
            async function downloadSequentially4Digit(baseUrl, startNum, endNum, ext = 'jpg') {
                const formattedBaseUrl = baseUrl.endsWith('/') ? baseUrl : baseUrl + '/';
                
                for (let i = startNum; i <= endNum; i++) {
                    // 숫자를 4자리 문자열로 변환 (예: 1 -> "0001", 12 -> "0012")
                    const paddedNum = String(i).padStart(4, '0');
                    const fileName = 'xiaoeun_'+`${paddedNum}.${ext}`;
                    const imageUrl = `${formattedBaseUrl}${fileName}`;
                    
                    console.log(`시도 중 (${i}/${endNum}): ${imageUrl}`);
                    
                    try {
                        const response = await fetch(imageUrl);
                        if (!response.ok) {
                            console.warn(`파일 없음 또는 에러: ${fileName} (건너뜀)`);
                            continue; 
                        }
                        
                        const blob = await response.blob();
                        const objectUrl = URL.createObjectURL(blob);
                        
                        const link = document.createElement('a');
                        link.href = objectUrl;
                        link.download = fileName;
                        
                        document.body.appendChild(link);
                        link.click();
                        
                        document.body.removeChild(link);
                        URL.revokeObjectURL(objectUrl);
                        
                        console.log(`다운로드 완료: ${fileName}`);
                        
                    } catch (error) {
                        console.error(`다운로드 실패: ${fileName}`, error);
                    }
                    
                    // 브라우저 과부하 및 차단 방지 (0.5초 대기)
                    await new Promise(resolve => setTimeout(resolve, 500));
                }
                console.log(' 모든 다운로드 작업이 완료되었습니다.');
            }

            // --- 실행 구간 ---           
            let targetUrl = document.getElementById('targetUrl').value;
            // 예시: 1번(0001.jpg)부터 100번(0100.jpg)까지 다운로드할 경우
            let startNum = document.getElementById('startNum').value;
            let endNum = document.getElementById('endNum').value;
            let ext = document.getElementById('ext').value;            

            downloadSequentially4Digit(targetUrl, startNum, endNum, ext);

            
        };
        download_btn.addEventListener('click',download_all, false);
    </script>
    
    <!-- <script src="./downloader.js"></script> -->
</html>

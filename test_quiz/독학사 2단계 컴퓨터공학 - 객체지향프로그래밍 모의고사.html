function renderQuiz() {
    const container = document.getElementById('quiz-container');
    quizData.forEach((item) => {
        const card = document.createElement('div');
        card.className = 'quiz-card';

        let codeHtml = item.code ? `<div class="code-block">${escapeHtml(item.code)}</div>` : '';
        
        let optionsHtml = '';
        item.options.forEach((opt, idx) => {
            optionsHtml += `
                <label class="option-label">
                    <input type="radio" name="q_${item.id}" value="${idx + 1}">
                    ${idx + 1}. ${opt}
                </label>
            `;
        });

        card.innerHTML = `
            <div class="question">Q${item.id}. ${item.q}</div>
            ${codeHtml}
            <div class="options">
                ${optionsHtml}
            </div>
            <button class="btn-check" onclick="checkAnswer(${item.id}, ${item.ans})">정답 및 해설 확인</button>
            <div class="explanation-box" id="exp_${item.id}">
                <div class="ans-title" id="status_${item.id}"></div>
                <div><strong>해설:</strong> ${item.exp}</div>
            </div>
        `;
        container.appendChild(card);
    });
}

function escapeHtml(text) {
    return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function checkAnswer(id, correctAns) {
    const selected = document.querySelector(`input[name="q_${id}"]:checked`);
    const expBox = document.getElementById(`exp_${id}`);
    const statusText = document.getElementById(`status_${id}`);
    
    if(!selected) {
        alert("먼저 정답을 선택해 주세요!");
        return;
    }

    const userAns = parseInt(selected.value);
    if(userAns === correctAns) {
        statusText.innerHTML = `정답입니다! ⭕ (정답: ${correctAns}번)`;
        statusText.style.color = '#38a169';
    } else {
        statusText.innerHTML = `틀렸습니다! ❌ (정답: ${correctAns}번 / 선택한 답: ${userAns}번)`;
        statusText.style.color = '#e53e3e';
    }
    
    expBox.classList.add('visible');
}

window.onload = renderQuiz;
